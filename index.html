<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIN_4IK</title>

<style>
/* ==========================
   Стили страницы
========================== */
body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
    height: 100vh;
    cursor: default;
}

#matrix {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding-top: 50px;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00ff00;
}

.terminal {
    border: 1px solid #00ff00;
    display: inline-block;
    padding: 15px;
    min-width: 260px;
}

.line {
    margin: 6px 0;
}

.button {
    display: block;
    color: #00ff00;
    text-decoration: none;
    padding: 6px;
    border: 1px solid #00ff00;
    margin-top: 8px;
    transition: 0.2s;
}

.button:hover {
    background: #00ff00;
    color: black;
}

.cursor {
    display: inline-block;
    width: 8px;
    background: #00ff00;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>MIN_4IK</h1>

    <div class="terminal">
        <!-- Печатающийся текст -->
        <div id="typed" class="line"></div>
        <!-- Fake scan/loading -->
        <div id="scan" class="line"></div>
        <!-- Мигающий курсор -->
        <div class="line"><span class="cursor"></span></div>
        <!-- Кнопки -->
        <div id="buttons"></div>
    </div>
</div>

<!-- Аудио-контейнер со звуком печати -->
<audio id="typeSound" src="https://pixabay.com/static/uploads/sound-effects/keyboard-typing-sound-247417.mp3"></audio>

<script>
// ============================
// 1. Падающий код (Matrix)
// ============================
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = [];
for(let x=0; x<columns; x++) drops[x] = Math.random() * canvas.height;

function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for(let i=0; i<drops.length; i++){
        const text = letters.charAt(Math.floor(Math.random()*letters.length));
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);
        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(drawMatrix, 50);

// ============================
// 2. Печатающийся текст + звук
// ============================
const message = "system://loading profile... access granted ✔ user: MIN_4IK";
let index = 0;
const typed = document.getElementById("typed");
const sound = document.getElementById("typeSound");

// переменная для активации звука после клика
let soundEnabled = false;

// слушаем первый клик по странице для активации звука
document.addEventListener("click", function() {
    if(!soundEnabled){
        soundEnabled = true;
        console.log("Звук активирован!");
        sound.play();
    }
});

// функция печати с проверкой активации звука
function typeText() {
    if(index < message.length){
        typed.innerHTML += message.charAt(index);
        if(soundEnabled){
            sound.currentTime = 0;
            sound.play();
        }
        index++;
        setTimeout(typeText, 50);
    } else {
        startScan();
    }
}
typeText();

// ============================
// 3. Fake scanning/loading
// ============================
const scan = document.getElementById("scan");
const scanLines = [
    "scanning files... [#####     ]",
    "loading modules... [###       ]",
    "checking system integrity... [######  ]",
    "virus detected: 0",
    "loading complete ✔"
];
let scanIndex = 0;

function startScan() {
    if(scanIndex < scanLines.length){
        scan.innerHTML += scanLines[scanIndex] + "<br>";
        scanIndex++;
        setTimeout(startScan, 500);
    }
}

// ============================
// 4. Кнопки (ссылки)
// ============================
const links = [
    {name: "Telegram", url: "#"},
    {name: "YouTube", url: "#"},
    {name: "Discord", url: "#"}
];

const container = document.getElementById("buttons");
links.forEach(link => {
    const a = document.createElement("a");
    a.className = "button";
    a.href = link.url;
    a.innerText = "> " + link.name;
    a.target = "_blank";
    
    // добавляем воспроизведение звука при клике на кнопку
    a.addEventListener("click", function(){
        if(soundEnabled){
            sound.currentTime = 0;
            sound.play();
        }
    });

    container.appendChild(a);
});
</script>

</body>
</html>
