<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIN_4IK - SYSTEM HACK</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: monospace;
    background: black;
    color: #00ff00;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Loader с процентами */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    font-size: 24px;
}

/* Контейнер с рамкой */
.container {
    text-align: center;
    position: relative;
    z-index: 1;
    display: none;
    padding: 30px;
    border: 2px solid #00ff00;
    box-shadow: 0 0 20px #00ff00;
    background: rgba(0,0,0,0.8);
    border-radius: 10px;
}

h1 { font-size: 36px; margin-bottom: 25px; letter-spacing: 2px; }

.btn {
    display: block;
    margin: 10px auto;
    padding: 12px 20px;
    width: 220px;
    border: 1px solid #00ff00;
    color: #00ff00;
    text-decoration: none;
    transition: 0.3s;
    cursor: pointer;
}

.btn:hover { background: #00ff00; color: black; box-shadow: 0 0 15px #00ff00; }

canvas { position: fixed; top: 0; left: 0; z-index: 0; }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">Загрузка системы: 0%</div>

<!-- Matrix фон -->
<canvas id="matrix"></canvas>

<!-- Контейнер для кнопок -->
<div class="container">
    <h1>MIN_4IK</h1>
    <div id="buttonsContainer"></div>
</div>

<!-- Фоновая музыка -->
<audio id="backgroundMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<script>
/* ==============================
      Загрузка с процентами
============================== */
let percent = 0;
const loaderText = document.getElementById('loader');
const interval = setInterval(() => {
    percent++;
    loaderText.textContent = `Загрузка системы: ${percent}%`;
    if (percent >= 100) {
        clearInterval(interval);
        loaderText.style.display = 'none';
        document.querySelector('.container').style.display = 'block';
    }
}, 50);

/* ==============================
      Matrix эффект
============================== */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({length: columns}, () => 1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";
    for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
    requestAnimationFrame(drawMatrix);
}
drawMatrix();

/* ==============================
      Динамические кнопки (любое количество)
============================== */
const buttons = [
    {text: "Telegram", link: "https://t.me/ТВОЙ_ТГ"},
    {text: "YouTube", link: "https://youtube.com/"},
    {text: "Discord", link: "https://discord.com/"},
    {text: "Twitch", link: "https://twitch.tv/"},
    {text: "Instagram", link: "#"},
    {text: "TikTok", link: "#"}
];

const buttonsContainer = document.getElementById('buttonsContainer');

buttons.forEach(b => {
    const a = document.createElement('a');
    a.href = b.link;
    a.textContent = b.text;
    a.className = 'btn';
    buttonsContainer.appendChild(a);

    // Клик запускает только взлом-анимацию
    a.addEventListener('click', () => {
        triggerHackAnimation();
    });
});

/* ==============================
      Взлом-анимация
============================== */
function triggerHackAnimation() {
    const hackCanvas = document.createElement('canvas');
    hackCanvas.style.position = 'fixed';
    hackCanvas.style.top = '0';
    hackCanvas.style.left = '0';
    hackCanvas.style.width = '100%';
    hackCanvas.style.height = '100%';
    hackCanvas.style.zIndex = 5;
    document.body.appendChild(hackCanvas);

    const hc = hackCanvas.getContext('2d');
    hackCanvas.width = window.innerWidth;
    hackCanvas.height = window.innerHeight;

    const chars = "01<>#%&@";
    let particles = Array.from({length: 100}, () => ({
        x: Math.random() * hackCanvas.width,
        y: Math.random() * hackCanvas.height,
        speedY: Math.random() * 3 + 1,
        char: chars.charAt(Math.floor(Math.random() * chars.length))
    }));

    let count = 0;
    function animate() {
        hc.fillStyle = "rgba(0,0,0,0.1)";
        hc.fillRect(0,0,hackCanvas.width,hackCanvas.height);
        hc.fillStyle = "#00ff00";
        hc.font = "20px monospace";
        particles.forEach(p => {
            hc.fillText(p.char, p.x, p.y);
            p.y += p.speedY;
            if (p.y > hackCanvas.height) p.y = 0;
        });
        count++;
        if (count < 60) requestAnimationFrame(animate);
        else hackCanvas.remove();
    }
    animate();
}

/* ==============================
      Фоновая музыка (играет после клика)
============================== */
const music = document.getElementById("backgroundMusic");
document.body.addEventListener("click", () => {
    if (music.paused) music.play();
});
</script>
</body>
</html>
