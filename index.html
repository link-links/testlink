<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIN_4IK</title>

<style>
/* ==========================
   Стили страницы
   ==========================
   body: фон и основной шрифт
   #matrix: canvas для падающего кода
   .container: блок с терминалом и кнопками
   .terminal: рамка вокруг текста
   .line: отдельная строка текста
   .button: кнопки с ссылками
   .cursor: мигающий курсор
========================== */
body {
    margin: 0;
    background: black; /* фон страницы */
    color: #00ff00; /* цвет текста */
    font-family: monospace; /* терминальный шрифт */
    overflow: hidden;
    height: 100vh;
}

#matrix {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0; /* ниже всех элементов */
}

.container {
    position: relative;
    z-index: 1; /* поверх падающего кода */
    text-align: center;
    padding-top: 50px;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00ff00; /* светящийся эффект */
}

.terminal {
    border: 1px solid #00ff00;
    display: inline-block;
    padding: 15px;
    min-width: 260px;
}

.line {
    margin: 6px 0;
}

.button {
    display: block;
    color: #00ff00;
    text-decoration: none;
    padding: 6px;
    border: 1px solid #00ff00;
    margin-top: 8px;
    transition: 0.2s;
}

.button:hover {
    background: #00ff00;
    color: black;
}

.cursor {
    display: inline-block;
    width: 8px;
    background: #00ff00;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>
<body>

<!-- Canvas для падающего кода -->
<canvas id="matrix"></canvas>

<div class="container">
    <h1>MIN_4IK</h1>

    <div class="terminal">
        <div id="typed" class="line"></div> <!-- Здесь печатается текст -->
        <div id="scan" class="line"></div>  <!-- Здесь отображается fake scan/loading -->
        <div class="line"><span class="cursor"></span></div> <!-- Мигающий курсор -->
        <div id="buttons"></div> <!-- Здесь будут кнопки -->
    </div>
</div>

<!-- Аудио: loop музыка и звук печати -->
<audio id="bgMusic" preload="auto" loop src="https://cdn.pixabay.com/audio/2023/07/31/audio_1e1d66.mp3"></audio>
<audio id="typeSound" preload="auto" muted src="https://pixabay.com/static/uploads/sound-effects/keyboard-typing-sound-247417.mp3"></audio>

<script>
// ============================
// 1. Падающий код (Matrix)
// ============================
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = [];
for(let x=0; x<columns; x++) drops[x] = Math.random() * canvas.height;

// Функция рисует падающие буквы
function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)"; // полупрозрачный след
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for(let i=0; i<drops.length; i++){
        const text = letters.charAt(Math.floor(Math.random()*letters.length));
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);
        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(drawMatrix, 50); 

// ============================
// 2. Loop музыка + звук печати
// ============================
const bgMusic = document.getElementById("bgMusic"); // loop музыка
const sound = document.getElementById("typeSound"); // звук печати
let soundEnabled = false;

// Первый клик пользователя — включаем музыку и разрешаем звук
document.body.addEventListener("click", function initSound() {
    if(!soundEnabled){
        soundEnabled = true;
        bgMusic.play().catch(e=>console.log(e)); // запускаем loop музыку
        sound.muted = false;
        sound.currentTime = 0;
        sound.play().catch(e=>console.log(e)); // один раз для разблокировки браузером
        document.body.removeEventListener("click", initSound);
        console.log("Звук разрешен и музыка запущена");
    }
});

// Функция проигрывания короткого звука печати (для текста и кнопок)
function playTypeSound(){
    if(soundEnabled){
        const clone = sound.cloneNode(); // клонируем, чтобы браузер разрешил звук в setTimeout
        clone.play();
    }
}

// ============================
// 3. Печатающийся текст
// ============================
const message = "system://loading profile... access granted ✔ user: MIN_4IK";
let index = 0;
const typed = document.getElementById("typed");

function typeText() {
    if(index < message.length){
        typed.innerHTML += message.charAt(index);
        playTypeSound(); // звук печати
        index++;
        setTimeout(typeText, 50);
    } else startScan();
}
typeText();

// ============================
// 4. Fake scan/loading
// ============================
const scan = document.getElementById("scan");
const scanLines = [
    "scanning files... [#####     ]",
    "loading modules... [###       ]",
    "checking system integrity... [######  ]",
    "virus detected: 0",
    "loading complete ✔"
];
let scanIndex = 0;

function startScan(){
    if(scanIndex < scanLines.length){
        scan.innerHTML += scanLines[scanIndex]+"<br>";
        playTypeSound(); // звук печати
        scanIndex++;
        setTimeout(startScan, 500);
    }
}

// ============================
// 5. Кнопки с ссылками и звуком
// ============================
const links = [
    {name: "Telegram", url: "#"}, // название и ссылка кнопки
    {name: "YouTube", url: "#"},
    {name: "Discord", url: "#"}
];
const container = document.getElementById("buttons");

links.forEach(link=>{
    const a = document.createElement("a");
    a.className = "button";
    a.href = link.url;
    a.innerText = "> " + link.name;
    a.target = "_blank";

    // звук при нажатии на кнопку
    a.addEventListener("click", ()=>playTypeSound());

    container.appendChild(a);
});
</script>

</body>
</html>
