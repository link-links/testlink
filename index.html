<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIN_4IK - SYSTEM HACK</title>

<style>
/* ==========================
   Стили страницы
========================== */
body {
    margin: 0;
    background: black; /* фон страницы */
    color: #00ff00; /* цвет текста */
    font-family: monospace; /* терминальный шрифт */
    overflow: hidden;
}

/* Canvas для падающего Matrix кода */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1; /* позади всего контента */
}

/* Контейнер с терминалом и кнопками */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* Терминал */
#terminal {
    padding: 20px;
    white-space: pre-wrap; /* перенос строк */
    line-height: 1.4;
}

/* Кнопки */
.btn {
    display: inline-block;
    margin: 8px;
    padding: 10px 20px;
    border: 1px solid #00ff00;
    border-radius: 6px;
    color: #00ff00;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #00ff00;
    color: black;
    box-shadow: 0 0 15px #00ff00;
}

/* Мигающий курсор */
.cursor {
    display: inline-block;
    width: 10px;
    background-color: #00ff00;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,50%,100% { background-color: #00ff00; }
    25%,75% { background-color: black; }
}
</style>
</head>

<body>

<!-- ==========================
     Canvas для падающего Matrix
========================== -->
<canvas id="matrix"></canvas>

<!-- Контейнер терминала и кнопок -->
<div class="container">
    <div id="terminal"></div> <!-- Здесь печатается текст -->
    <div id="buttons" style="margin-top:20px;"></div> <!-- Здесь кнопки -->
</div>

<!-- ==========================
     Loop хакерской печати
========================== -->
<audio id="hackSound" loop preload="auto" muted>
    <source src="https://pixabay.com/static/uploads/sound-effects/keyboard-typing-sound-247417.mp3" type="audio/mpeg">
</audio>

<script>
// ============================
// 1. Matrix падающий код
// ============================

// Получаем canvas
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// Устанавливаем размер canvas
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Символы для падающего кода
const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);

// Массив для каждой колонки (drop)
const drops = Array.from({length: columns}, () => 1);

// Функция рисует падающий Matrix код
function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)"; // прозрачный след
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#00ff00"; // цвет символов
    ctx.font = fontSize + "px monospace";

    drops.forEach((y,i)=>{
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, y*fontSize);
        drops[i] = y*fontSize > canvas.height && Math.random()>0.975 ? 0 : y+1;
    });

    requestAnimationFrame(drawMatrix); // рекурсивно
}

drawMatrix();

// ============================
// 2. Loop хакерской печати
// ============================

// Получаем audio элемент
const hackSound = document.getElementById("hackSound");
let soundEnabled = false;

// Первый клик пользователя разрешает звук
document.body.addEventListener("click", ()=>{
    if(!soundEnabled){
        soundEnabled = true;
        hackSound.muted = false;
        hackSound.play().catch(e=>console.log(e));
        console.log("Звук печати активирован");
    }
});

// Функция проигрывания короткого звука печати
function playTypeSound(){
    if(soundEnabled){
        const clone = hackSound.cloneNode(); // клонируем, чтобы браузер разрешил
        clone.play();
    }
}

// ============================
// 3. Печатающийся текст с мигающим курсором
// ============================

// terminal — куда выводим текст
const terminal = document.getElementById("terminal");

// Здесь можно менять строки текста
const lines = [
    "[SYSTEM ONLINE]",
    "[ACCESSING MIN_4IK NETWORK...]",
    "[FIREWALL BYPASSED]",
    "[LOADING USER DATA...]",
    "[SUCCESS]",
    "[WELCOME, OPERATOR]"
];

let i=0; // текущая строка
function typeLine(line, callback){
    let j=0; // индекс символа
    const interval = setInterval(()=>{
        terminal.innerHTML += line[j];
        playTypeSound(); // звук печати
        j++;
        if(j>=line.length){
            clearInterval(interval);
            terminal.innerHTML += "\n"; // переход на новую строку
            if(callback) callback();
        }
    },50); // скорость печати (мс)
}

function typeLines(){
    if(i<lines.length){
        typeLine(lines[i], ()=>{ i++; typeLines(); });
    } else {
        // добавляем мигающий курсор после текста
        terminal.innerHTML += '<span class="cursor"></span>';
    }
}

typeLines();

// ============================
// 4. Кнопки (неограниченное количество)
// ============================

// Здесь можно добавлять/удалять кнопки
const buttons = [
    {name:"Telegram", url:"https://t.me/min_4ik"},
    {name:"YouTube", url:"https://www.youtube.com/@min4ik"},
    {name:"Discord", url:"https://discord.com/users/424203787234967564"},
    {name:"Twitch", url:"https://www.twitch.tv/min_4ik"},
    {name:"TikTok", url:"https://www.tiktok.com/@min_44ik"},
    {name:"ВКонтакте", url:"https://vk.com/min_4ik"}
];

// Контейнер для кнопок
const container = document.getElementById("buttons");

// Создание кнопок с звуком при клике
buttons.forEach(btn=>{
    const a = document.createElement("a");
    a.className = "btn";
    a.href = btn.url;
    a.innerText = btn.name;
    a.target = "_blank";
    a.addEventListener("click", playTypeSound); // звук при клике
    container.appendChild(a);
});
</script>

</body>
</html>
