<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgaP0rn</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Фон "матрица" */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Контейнер */
.container {
    text-align: center;
}

/* Заголовок */
h1 {
    font-size: 32px;
    margin-bottom: 20px;
}

/* Кнопки */
.btn {
    display: block;
    margin: 10px auto;
    padding: 12px 20px;
    width: 200px;
    border: 1px solid #00ff00;
    color: #00ff00;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #00ff00;
    color: black;
    box-shadow: 0 0 15px #00ff00;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>AgaP0rn</h1>

    <a href="https://t.me/ТВОЙ_ТГ" class="btn">Telegram</a>
    <a href="https://youtube.com/" class="btn">YouTube</a>
    <a href="https://discord.com/" class="btn">Discord</a>
    <a href="https://twitch.tv/" class="btn">Twitch</a>
    <a href="#" class="btn">Instagram</a>
    <a href="#" class="btn">TikTok</a>
</div>

<script>
// Matrix эффект
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for (let x = 0; x < columns; x++)
    drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
