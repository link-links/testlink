<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIN_4IK - HACK SYSTEM</title>

<style>
body {
    margin:0;
    background:black;
    color:#00ff00;
    font-family:monospace;
    overflow:hidden;
}

canvas { position:fixed; top:0; left:0; z-index:-2; }

.container {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

#terminal {
    white-space:pre-wrap;
    padding:20px;
}

#cameraBox {
    display:none;
    margin-top:20px;
    border:2px solid #00ff00;
    width:300px;
    height:200px;
    position:relative;
}

#cameraBox video {
    width:100%;
    height:100%;
    object-fit:cover;
    filter:contrast(2) brightness(0.6) grayscale(1);
}

#rec {
    position:absolute;
    top:5px;
    left:5px;
    color:red;
    animation: blink 1s infinite;
}

#seeYou {
    position:absolute;
    bottom:5px;
    left:5px;
    color:red;
}

@keyframes blink {
    0%,50%,100%{opacity:1;}
    25%,75%{opacity:0;}
}

#alertMsg {
    display:none;
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    color:red;
    animation: blink 0.7s infinite;
}

#timer {
    color:red;
    margin-top:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
<div id="terminal"></div>

<div id="cameraBox">
<div id="rec">● REC</div>
<div id="seeYou">WE SEE YOU</div>
<video autoplay muted loop>
<source src="https://cdn.pixabay.com/video/2022/03/15/110662-687543015_tiny.mp4">
</video>
</div>

<div id="alertMsg">DON'T CLOSE THIS PAGE</div>
<div id="timer"></div>

</div>

<audio id="typing" loop muted>
<source src="https://pixabay.com/static/uploads/sound-effects/keyboard-typing-sound-247417.mp3">
</audio>

<audio id="alarm">
<source src="https://pixabay.com/static/uploads/sound-effects/alarm-10946.mp3">
</audio>

<audio id="beep">
<source src="https://www.soundjay.com/button/beep-07.mp3">
</audio>

<script>
// ===== MATRIX =====
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth; c.height=innerHeight;
const letters="01ABCDEF";
const size=14;
const cols=c.width/size;
const drops=Array(Math.floor(cols)).fill(1);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#0f0";
ctx.font=size+"px monospace";

drops.forEach((y,i)=>{
let t=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(t,i*size,y*size);
drops[i]=y*size>c.height?0:y+1;
});
requestAnimationFrame(draw);
}
draw();

// ===== SOUND =====
const typing=document.getElementById("typing");
const alarm=document.getElementById("alarm");
const beep=document.getElementById("beep");

let started=false;
document.body.onclick=()=>{
if(!started){
started=true;
typing.muted=false;
typing.play();
}
}

// ===== ДАННЫЕ =====
function rand(a,b){return Math.floor(Math.random()*(b-a)+a);}

function ip(){
return `${rand(10,255)}.${rand(0,255)}.${rand(0,255)}.${rand(0,255)}`;
}

function device(){
const arr=["Samsung","Vivo","iPhone","Huawei","Xiaomi"];
return arr[rand(0,arr.length)];
}

function user(){
let name = navigator.userAgent;
return name.includes("Android") ? "android_user" :
       name.includes("iPhone") ? "iphone_user" :
       "guest_"+rand(1000,9999);
}

function locationFake(){
let lang = navigator.language;
if(lang.includes("ru")) return "Russia";
if(lang.includes("en")) return "USA";
if(lang.includes("de")) return "Germany";
return "Unknown";
}

// ===== TERMINAL =====
const term=document.getElementById("terminal");

function type(text,cb){
let i=0;
let int=setInterval(()=>{
term.innerHTML+=text[i];
i++;
if(i>=text.length){
clearInterval(int);
term.innerHTML+="\n";
cb&&cb();
}
},30);
}

// ===== СТАРТ =====
type("[SYSTEM START]",()=>{
type("[CONNECTING...]",()=>{
setTimeout(start,500);
});
});

function start(){
alarm.play();

type("[TARGET FOUND]",()=>{
type("[USERNAME: "+user()+"]",()=>{
type("[DEVICE: "+device()+"]",()=>{
type("[LOCATION: "+locationFake()+"]",()=>{
type("[IP: "+ip()+"]",()=>{
type("[ACCESS CAMERA...]",()=>{
document.getElementById("cameraBox").style.display="block";
type("[CAMERA ONLINE]",()=>{
hack();
});
});
});
});
});
});
}

// ===== ВЗЛОМ =====
function hack(){
let p=0;
let int=setInterval(()=>{
p+=5;
term.innerHTML+=`[HACKING ${p}%]\n`;
if(p>=100){
clearInterval(int);
files();
}
},100);
}

// ===== ФАЙЛЫ =====
function files(){
type("[SCANNING FILES...]",()=>{
type("[FOUND: photos.zip]",()=>{
type("[FOUND: passwords.txt]",()=>{
type("[FOUND: chats.log]",()=>{
download();
});
});
});
});
}

function download(){
let p=0;
let int=setInterval(()=>{
p+=10;
term.innerHTML+=`[DOWNLOADING DATA ${p}%]\n`;
if(p>=100){
clearInterval(int);
finish();
}
},120);
}

// ===== ФИНАЛ =====
function finish(){
document.getElementById("alertMsg").style.display="block";

let t=10;
let timer=document.getElementById("timer");

let int=setInterval(()=>{
timer.innerHTML="TIME LEFT: "+t;
t--;
if(t<0) clearInterval(int);
},1000);

type("[ACCESS GRANTED]",()=>{
type("[ALL DATA STORED]",()=>{
beep.play();
});
});
}
</script>

</body>
</html>
