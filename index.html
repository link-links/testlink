<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>min_4ik</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: monospace;
    background: black;
    color: #00ff00;
    overflow: hidden;
}

/* Фейковая загрузка */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#loader span {
    font-size: 24px;
    margin-top: 20px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}

/* Контейнер с кнопками */
.container {
    text-align: center;
    position: relative;
    z-index: 1;
    display: none;
}

h1 {
    font-size: 32px;
    margin-bottom: 20px;
}

.btn {
    display: block;
    margin: 10px auto;
    padding: 12px 20px;
    width: 200px;
    border: 1px solid #00ff00;
    color: #00ff00;
    text-decoration: none;
    transition: 0.3s;
    cursor: pointer;
}

.btn:hover {
    background: #00ff00;
    color: black;
    box-shadow: 0 0 15px #00ff00;
}

/* Matrix canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}
</style>
</head>
<body>

<div id="loader">
    <div>Загрузка системы...</div>
    <span>█ █ █ █ █</span>
</div>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>min_4ik</h1>
    <a href="https://t.me/ТВОЙ_ТГ" class="btn">Telegram</a>
    <a href="https://youtube.com/" class="btn">YouTube</a>
    <a href="https://discord.com/" class="btn">Discord</a>
    <a href="https://twitch.tv/" class="btn">Twitch</a>
    <a href="#" class="btn">Instagram</a>
    <a href="#" class="btn">TikTok</a>
</div>

<audio id="clickSound" src="music.mp3"></audio>

<script>
// --------------------- Фейковая загрузка ---------------------
setTimeout(() => {
    document.getElementById('loader').style.display = 'none';
    document.querySelector('.container').style.display = 'block';
}, 3000); // 3 секунды

// --------------------- Matrix эффект ---------------------
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({length: columns}, () => 1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";
    for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(drawMatrix, 33);

// --------------------- Музыка на клик ---------------------
const clickSound = document.getElementById('clickSound');
document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', () => {
        clickSound.currentTime = 0;
        clickSound.play();
        triggerHackAnimation();
    });
});

// --------------------- Взлом-анимация ---------------------
function triggerHackAnimation() {
    const hackCanvas = document.createElement('canvas');
    hackCanvas.style.position = 'fixed';
    hackCanvas.style.top = '0';
    hackCanvas.style.left = '0';
    hackCanvas.style.width = '100%';
    hackCanvas.style.height = '100%';
    hackCanvas.style.zIndex = 5;
    document.body.appendChild(hackCanvas);

    const hc = hackCanvas.getContext('2d');
    hackCanvas.width = window.innerWidth;
    hackCanvas.height = window.innerHeight;

    const chars = "01<>#%&@";
    let particles = Array.from({length: 100}, () => ({
        x: Math.random() * hackCanvas.width,
        y: Math.random() * hackCanvas.height,
        speedY: Math.random() * 3 + 1,
        char: chars.charAt(Math.floor(Math.random() * chars.length))
    }));

    let count = 0;
    function animate() {
        hc.fillStyle = "rgba(0,0,0,0.1)";
        hc.fillRect(0,0,hackCanvas.width,hackCanvas.height);
        hc.fillStyle = "#00ff00";
        hc.font = "20px monospace";
        particles.forEach(p => {
            hc.fillText(p.char, p.x, p.y);
            p.y += p.speedY;
            if (p.y > hackCanvas.height) p.y = 0;
        });
        count++;
        if (count < 60) requestAnimationFrame(animate); // 60 кадров ~ 2 секунды
        else hackCanvas.remove();
    }
    animate();
}
</script>

</body>
</html>
